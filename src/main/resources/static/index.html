<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="SearchConsole autocomplete console — real-time prefix suggestions powered by a distributed Redis cluster and in-memory Trie." />
    <title>SearchConsole</title>
    <link rel="stylesheet" href="styles.css?v=9" />
</head>
<body>
<main class="container">

    <header class="main-header">
        <h1>Search<span class="badge">Console</span></h1>
        <div class="status-indicator">
            <span class="status-dot"></span>
            <span>Cluster · 3 Nodes</span>
        </div>
    </header>

    <div class="dashboard-grid">

        <!-- LEFT: Search + Result -->
        <div class="col col-left">
            <section class="search-box">
                <h2>Search</h2>
                <div class="input-row">
                    <div class="input-wrapper">
                        <input
                            id="search-input"
                            type="text"
                            placeholder="Type a prefix…"
                            autocomplete="off"
                            aria-label="Search query"
                        />
                    </div>
                    <button id="search-btn">Search</button>
                </div>
                <div id="dropdown-container" class="dropdown-container hidden">
                    <ul id="suggestions" class="suggestions" role="listbox" tabindex="-1"></ul>
                    <div id="loading" class="loading hidden">
                        <span class="spinner"></span>
                        <span>Fetching…</span>
                    </div>
                    <div id="error" class="error hidden"></div>
                </div>
            </section>

            <section class="results">
                <h2>Result</h2>
                <div id="search-result" class="result-placeholder">No search performed yet.</div>
            </section>
        </div>

        <!-- MIDDLE: Trending -->
        <div class="col col-mid">
            <section class="trending">
                <h2>Trending</h2>
                <ul id="trending-list">
                    <li class="trending-empty">Loading…</li>
                </ul>
            </section>
        </div>

        <!-- RIGHT: Metrics 2×2 -->
        <div class="col col-right">
            <section class="metrics-panel">
                <div class="panel-header">
                    <h2>Diagnostics</h2>
                    <button id="refresh-metrics-btn">↻</button>
                </div>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label">Cache Hit Rate</span>
                        <span id="metric-hit-rate" class="metric-value">—</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Avg / p95</span>
                        <span id="metric-latency" class="metric-value">—</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Searches</span>
                        <span id="metric-searches" class="metric-value">—</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Write Reduction</span>
                        <span id="metric-reduction" class="metric-value">—</span>
                    </div>
                </div>
            </section>
        </div>

    </div>

</main>
<script src="app.js?v=9"></script>
</body>
</html>
